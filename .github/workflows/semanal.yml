name: E-mail semanal - Biblioteca LDCM

on:
  schedule:
    # Segunda-feira 10:00 Brasilia = 13:00 UTC
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enviar:
    runs-on: ubuntu-latest
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      SP_SITE_ID: ${{ secrets.SP_SITE_ID }}
      SP_LIST_ID: ${{ secrets.SP_LIST_ID }}
      EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
      DATA_CORTE: ${{ secrets.DATA_CORTE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install msal requests python-dotenv tenacity
      - run: python main_semanal.py --enviar
      - name: Commit offset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offset_semanal.txt
          git diff --cached --quiet || git commit -m "Offset semanal: $(cat offset_semanal.txt)"
          git push
