name: Campanha diária - Biblioteca LDCM

on:
  schedule:
    # 10:00 Brasília = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch: # permite execução manual

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install msal requests python-dotenv tenacity

      - name: Criar .env a partir dos secrets
        run: |
          cat > .env << 'ENVEOF'
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          SP_SITE_ID=${{ secrets.SP_SITE_ID }}
          SP_LIST_ID=${{ secrets.SP_LIST_ID }}
          EMAIL_REMETENTE=${{ secrets.EMAIL_REMETENTE }}
          EMAIL_DESTINATARIOS=${{ secrets.EMAIL_DESTINATARIOS }}
          DATA_CORTE=${{ secrets.DATA_CORTE }}
          ENVEOF

      - name: Executar campanha
        run: python main_campanha.py --enviar
