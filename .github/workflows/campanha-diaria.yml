name: E-mail diario - Biblioteca LDCM

on:
  schedule:
    # 10:00 Brasilia = 13:00 UTC (lote do dia + inscritos existentes)
    - cron: '0 13 * * *'
    # 12h, 14h, 16h, 18h Brasilia — envia para novos inscritos do dia
    - cron: '0 15,17,19,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enviar:
    runs-on: ubuntu-latest
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      SP_SITE_ID: ${{ secrets.SP_SITE_ID }}
      SP_LIST_ID: ${{ secrets.SP_LIST_ID }}
      EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
      DATA_CORTE: ${{ secrets.DATA_CORTE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install msal requests python-dotenv tenacity

      - name: Enviar e-mail diario
        run: python main_diario.py --enviar

      - name: Commit alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offset.txt sent_today.json
          git diff --cached --quiet || git commit -m "Diario: offset $(cat offset.txt)"
          git push
